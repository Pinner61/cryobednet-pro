seed: 42
run_name: bedmachine_rrdb_gpu

data:
  path: data/bedmachine_tiles.npz
  scale: 4
  batch_size: 16
  num_workers: 8

split:
  holdout_region: block_0_0
  val_fraction: 0.15

model:
  name: rrdb
  in_channels: 4
  base_channels: 64
  num_blocks: 10
  upscale: 4

train:
  epochs: 120
  lr: 0.0001
  weight_decay: 0.000001
  amp: true
  adversarial: true
  adv_weight: 0.0005
  grad_loss_weight: 0.2
  device: cuda

output_dir: outputs/bedmachine_rrdb_gpu

mlflow:
  enabled: false
  experiment: CryoBedNet
