seed: 42
run_name: srgan_region_holdout
data:
  path: data/mock_tiles.npz
  scale: 4
  batch_size: 12
  num_workers: 4
split:
  holdout_region: pine_island
  val_fraction: 0.15
model:
  name: rrdb
  in_channels: 4
  base_channels: 48
  num_blocks: 6
  upscale: 4
train:
  epochs: 60
  lr: 0.0001
  weight_decay: 0.000001
  amp: true
  adversarial: true
  adv_weight: 0.0005
  grad_loss_weight: 0.2
  device: cuda
output_dir: outputs/srgan_region_holdout
mlflow:
  enabled: true
  experiment: CryoBedNet
